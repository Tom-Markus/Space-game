<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#05070f" />
<title>ODYSSÉE SOLAIRE — Explorateur du Système Solaire</title>
<link rel="icon" href="./assets/textures/sun.jpg" />
<link rel="stylesheet" href="./styles.css" />
<script type="importmap">
{
  "imports": {
    "three": "./vendor/three/build/three.module.js",
    "three/addons/": "./vendor/three/jsm/"
  }
}
</script>
</head>
<body>
<canvas id="scene"></canvas>

<!-- effet de distorsion -->
<div id="warpfx"></div>

<!-- ======================= LOADING ======================= -->
<div id="loading" class="overlay">
  <div class="panel">
    <h1 class="logo">ODYSSÉE&nbsp;SOLAIRE</h1>
    <p class="subtitle" data-str="loadingSub">Initialisation des systèmes de navigation…</p>
    <div class="bar"><div id="loadbar" class="bar-fill"></div></div>
    <p id="loadlabel" class="loadlabel">0%</p>
  </div>
</div>

<!-- ======================= START MENU ======================= -->
<div id="start" class="overlay hidden">
  <div class="panel wide">
    <h1 class="logo">ODYSSÉE&nbsp;SOLAIRE</h1>
    <p class="subtitle" data-str="tagline"></p>
    <div class="controls-grid" id="controlsGrid"></div>
    <div class="quality" id="qualitySel">
      <span class="q-label" data-str="qualityTag">QUALITÉ DES TEXTURES</span>
      <div class="q-opts">
        <button class="q-opt" data-q="ultra">Ultra · 8K</button>
        <button class="q-opt" data-q="high">Élevé · 4K</button>
        <button class="q-opt" data-q="perf">Perf · 2K</button>
      </div>
      <p class="q-hint" id="qHint"></p>
    </div>
    <button id="startBtn" class="btn primary" data-str="startBtn">DÉCOLLAGE</button>
    <p class="hint" data-str="startHint"></p>
  </div>
</div>

<!-- ======================= HUD ======================= -->
<div id="hud" class="hidden">
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

  <svg id="reticle" viewBox="-50 -50 100 100" aria-hidden="true">
    <circle cx="0" cy="0" r="20" /><circle cx="0" cy="0" r="2.5" class="dot" />
    <path d="M -40 0 L -16 0 M 40 0 L 16 0 M 0 -40 L 0 -16 M 0 40 L 0 16" />
  </svg>

  <div id="targetArrow"><span>▲</span><em id="targetArrowDist"></em></div>
  <div id="targetMarker"><b id="targetMarkerName"></b><em id="targetMarkerDist"></em></div>

  <!-- mission (haut-gauche) -->
  <div id="missionPanel" class="hud-panel">
    <div class="mp-head"><span class="mp-tag" data-str="missionTag">MISSION</span><span id="mpCount"></span></div>
    <div id="mpTitle" class="mp-title"></div>
    <div id="mpDesc" class="mp-desc"></div>
    <div class="mp-prog"><div id="mpProgFill"></div></div>
    <div id="mpDist" class="mp-dist"></div>
  </div>

  <!-- journal (haut-droite) -->
  <div id="logPanel" class="hud-panel">
    <div class="mp-head"><span class="mp-tag" data-str="journalTag">JOURNAL DE BORD</span><span class="credits"><b id="creditsVal">0</b> cr</span></div>
    <ul id="logList"></ul>
  </div>

  <!-- télémétrie (bas-centre) -->
  <div id="telemetry">
    <div class="tele-speed">
      <span id="speedVal">0</span><span class="tele-unit">km/s</span>
      <span id="modeBadge" class="mode cruise">CROISIÈRE</span>
    </div>
    <div id="gauge"><div id="gaugeFill"></div><div class="gauge-ticks"></div></div>
    <div class="tele-near"><span class="tele-label" data-str="nearTag">CORPS PROCHE</span><span id="nearVal">—</span><span id="nearDist"></span></div>
  </div>

  <div id="prompt" class="hidden"></div>
  <div id="toast"></div>

  <!-- radar -->
  <div id="radar">
    <canvas id="minimap" width="240" height="240"></canvas>
    <div id="radarSweep"></div>
  </div>

  <!-- bouton musique (couper / remettre le son) -->
  <button id="musicBtn" type="button" aria-label="Couper la musique" title="Musique ♪">♪</button>

  <div id="help" class="hud-panel hidden"></div>
</div>

<!-- ======================= PAUSE ======================= -->
<div id="pause" class="overlay hidden">
  <div class="panel">
    <h2 data-str="pauseTitle">PAUSE</h2>
    <button id="resumeBtn" class="btn primary" data-str="resumeBtn">REPRENDRE</button>
    <button id="helpBtn" class="btn" data-str="helpBtn">COMMANDES</button>
  </div>
</div>

<!-- ======================= WIN ======================= -->
<div id="win" class="overlay hidden">
  <div class="panel wide">
    <h1 class="logo" data-str="winTitle">MISSION ACCOMPLIE</h1>
    <p class="subtitle" data-str="winSub"></p>
    <div id="winStats" class="winstats"></div>
    <button id="restartBtn" class="btn primary" data-str="restartBtn">NOUVELLE EXPÉDITION</button>
  </div>
</div>

<!-- ======================= MOBILE ======================= -->
<div id="touchUI" class="hidden">
  <div id="stick" class="stick"><div id="stickKnob" class="stick-knob"></div></div>
  <div class="touch-btns">
    <button class="tbtn warp" data-cmd="warp">WARP</button>
    <button class="tbtn" data-cmd="forward">▲</button>
    <button class="tbtn" data-cmd="boost">BOOST</button>
    <button class="tbtn act" data-cmd="interact">E</button>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
